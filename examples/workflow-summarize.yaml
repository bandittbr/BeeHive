id: summarize-site
name: Summarize Website
version: "1.0"
description: "Navega para um site, extrai o conteudo e resume com IA"

trigger:
  manual

steps:
  - id: extract
    capability: browser.scrape
    input:
      url: "{{input.url}}"
    output: page

  - id: summarize
    capability: chat.generate
    input:
      message: "Resuma o conteudo abaixo em 3 paragrafos:\n\n{{page.markdown}}"
    output: summary

outputs:
  markdown: "# Resumo: {{input.url}}\n\n{{summary.response}}"
