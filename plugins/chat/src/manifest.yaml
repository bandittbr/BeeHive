name: chat
version: 1.0.0
description: "Conversação multi-provedor com IA"
author: BeeHive

capabilities:
  - id: chat.converse
    description: "Envia mensagem e recebe resposta"
    inputs:
      - { name: message, type: string, required: true }
      - { name: provider, type: string }
      - { name: model, type: string }
      - { name: stream, type: boolean, default: false }
    outputs:
      - { name: response, type: string }
      - { name: usage, type: object }

  - id: chat.converse_stream
    description: "Envia mensagem e recebe resposta em streaming"

dependencies:
  - AIManager
  - ProviderManager
  - Memory

permissions:
  - ai:chat
  - ai:stream
  - memory:read
  - memory:write
