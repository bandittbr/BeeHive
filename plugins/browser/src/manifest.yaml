name: browser
version: 1.0.0
description: "AutomańŃo de navegador"
author: BeeHive

capabilities:
  - id: browser.browse
    description: "Navega para URL e retorna conte·do"
    inputs:
      - { name: url, type: string, required: true }
    outputs:
      - { name: content, type: string }
      - { name: screenshot, type: string }

  - id: browser.scrape
    description: "Extrai conte·do estruturado de pßgina"

  - id: browser.login
    description: "Executa fluxo de login em site"

  - id: browser.download
    description: "Download de arquivos"

adapters:
  - Playwright
  - Puppeteer
  - BrowserUse
  - Stagehand

permissions:
  - network:access
  - storage:write
