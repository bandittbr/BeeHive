name: browser
version: 1.1.0
description: "Plugin de navegador. Navega, extrai conteudo e captura screenshots."
author: BeeHive

requirements:
  runtime:
    - node >=22
  dependencies:
    - playwright
  setup:
    - npx playwright install chromium

capabilities:
  - id: browser.navigate
    description: "Navega para uma URL e retorna titulo e URL final"
    inputs:
      - { name: url, type: string, required: true, description: "URL para navegar" }
    outputs:
      - { name: title, type: string, description: "Titulo da pagina" }
      - { name: url, type: string, description: "URL final apos redirects" }

  - id: browser.scrape
    description: "Extrai conteudo de uma URL como Markdown"
    inputs:
      - { name: url, type: string, required: true, description: "URL para extrair" }
    outputs:
      - { name: markdown, type: string, description: "Conteudo em Markdown" }
      - { name: title, type: string, description: "Titulo da pagina" }

  - id: browser.screenshot
    description: "Captura screenshot de uma URL"
    inputs:
      - { name: url, type: string, required: true, description: "URL para capturar" }
      - { name: fullPage, type: boolean, default: false, description: "Capturar pagina inteira" }
    outputs:
      - { name: image, type: object, description: "Imagem como artifact" }

adapters:
  - Playwright

permissions:
  - browser:navigate
  - browser:scrape
  - browser:screenshot
