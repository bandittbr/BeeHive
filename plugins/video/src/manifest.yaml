name: video
version: 1.0.0
description: "Capacidades de vídeo: geração, edição, shorts, thumbnails"
author: BeeHive

capabilities:
  - id: video.generate_shorts
    description: "Gera shorts a partir de URL do YouTube"
    inputs:
      - { name: url, type: string, required: true, description: "URL do YouTube" }
      - { name: duration, type: number, description: "Duração alvo (segundos)", default: 60 }
      - { name: subtitles, type: boolean, description: "Incluir legendas", default: true }
    outputs:
      - { name: clips, type: array, description: "Lista de clips gerados" }
      - { name: metadata, type: object, description: "Metadados do vídeo" }

  - id: video.render
    description: "Renderiza vídeo a partir de roteiro e cenas"

  - id: video.export
    description: "Exporta vídeo em formato específico"

  - id: video.thumbnail
    description: "Gera thumbnail para vídeo"

adapters:
  - MoneyPrinterTurbo
  - VidBee
  - Remotion
  - MoviePy

dependencies:
  - AIManager
  - Storage

permissions:
  - storage:read
  - storage:write
