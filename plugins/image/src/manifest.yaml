name: image
version: 1.0.0
description: "Capacidades de imagem: geração, edição, upscale"
author: BeeHive

capabilities:
  - id: image.generate
    description: "Gera imagem a partir de prompt"
    inputs:
      - { name: prompt, type: string, required: true }
      - { name: width, type: number, default: 1024 }
      - { name: height, type: number, default: 1024 }
      - { name: style, type: string }
    outputs:
      - { name: images, type: array }

  - id: image.edit
    description: "Edita imagem existente"

  - id: image.upscale
    description: "Aumenta resolução da imagem"

  - id: image.remove_background
    description: "Remove fundo da imagem"

  - id: image.caption
    description: "Gera legenda para imagem"

adapters:
  - ComfyUI
  - DALL-E
  - StableDiffusion

permissions:
  - storage:read
  - storage:write
