name: shorts
version: 1.0.0
description: "Pipeline completo de criaçăo de Shorts"
author: BeeHive

capabilities:
  - id: shorts.download
    description: "Download de vídeo do YouTube"

  - id: shorts.transcribe
    description: "Transcreve áudio para texto"

  - id: shorts.detect_highlights
    description: "Detecta melhores momentos no vídeo"

  - id: shorts.crop
    description: "Corta clips nos melhores momentos"

  - id: shorts.add_subtitles
    description: "Adiciona legendas automáticas"

  - id: shorts.publish
    description: "Publica shorts em plataformas"

adapters:
  - yt-dlp
  - faster-whisper

dependencies:
  - AIManager
  - Storage
  - VideoPlugin

permissions:
  - storage:read
  - storage:write
  - ai:chat
