# Nixpacks config for BeeHive API backend on Railway
# Só sobe o backend (apps/api). O frontend (apps/web) fica no Vercel.

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "python311", "python311Packages.pip", "gcc", "ffmpeg"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "python3.11 -m pip install --upgrade pip",
  "python3.11 -m pip install -r pipeline/requirements.txt",
]

[start]
cmd = "pnpm run start --workspace apps/api"

[variables]
PORT = "4000"
PYTHONUNBUFFERED = "1"
