# Nixpacks config for BeeHive API backend on Railway
# Só sobe o backend (apps/api). O frontend (apps/web) fica no Vercel.

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "python311", "gcc", "ffmpeg", "curl"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "curl -sS https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py",
  "python3.11 /tmp/get-pip.py --user",
  "python3.11 -m pip install --user -r pipeline/requirements.txt",
]

[start]
cmd = "pnpm run start --workspace apps/api"

[variables]
PORT = "4000"
PYTHONUNBUFFERED = "1"
